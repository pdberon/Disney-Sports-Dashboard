name: Actualización Diaria de Métricas

on:
  schedule:
    - cron: '0 5 * * *' # Se ejecuta todos los días a las 5:00 AM UTC
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        pip install pandas

    - name: Procesar Datos
      run: python process_data.py

    - name: Commit y Push de los nuevos datos consolidado
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add frontend/public/data/traffic_distribution.json
        git diff-index --quiet HEAD || git commit -m "Auto: Actualización de datos diarios"
        git push
